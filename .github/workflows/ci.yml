name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Agent policy doctor
        run: uv run python scripts/agent_doctor.py

      - name: Focused agent policy tests
        run: uv run pytest -q -o addopts='' tests/test_agent_workflow.py tests/test_agent_guard_regressions.py

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -ra
